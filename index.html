// A realistic fare ESTIMATE from distance and cabin — labeled "est." everywhere it shows.
// Not a booked price, but honest enough that your total means something: American business
// to Paris lands near $3,000 one-way, as it should. Real fares replace these at booking.
function fareEstimate(from, to, cabin) {
  const km = distanceKm(from, to);
  if (km == null) return null;
  const perKm = { Economy: 0.11, Premium: 0.20, Business: 0.42, First: 0.72 }[cabin] || 0.11;
  const base = { Economy: 120, Premium: 250, Business: 600, First: 1100 }[cabin] || 120;
  const eff = km > 4000 ? perKm * 0.82 : perKm; // long-haul fares don't scale linearly
  return Math.round((base + km * eff) / 50) * 50;
}

function VoyageOne() {

  useEffect(() => {

      // A trip saved by an older version has a different shape. Loading it produces

    const id = setTimeout(() => { try { localStorage.setItem("voyage-one-trip", JSON.stringify(data)); setSaved(Date.now()); } catch (e) {} }, 500);
    return () => clearTimeout(id);
  }, [hydrated, dates, travelers, fromCity, homeCity, dests, returnFrom, returnMode, returnPick]);
  // Sensible defaults: fly home from your last stop, back to where you started.
  // But a suggestion must never fight the user — if it refills the moment the box is

// Flights are the one thing we will not invent. We do not sell them, we earn nothing on
// them, and a made-up airline is worse than no airline. So: tell the truth about the

function iataFor(city) { const a = airportFor(city); return a ? a.code : null; }

  const f = iataFor(from) || from, t2 = iataFor(to) || to;
  const cabinWord = { Economy: "economy", Premium: "premium economy", Business: "business", First: "first" }[cabin] || "";
  const q = `${cabinWord ? cabinWord + " " : ""}flights from ${f} to ${t2}${date ? " on " + date : ""}`;

}
function FlightPicker({ from, to, pick, upd, date }) {

  const chooseFlight = (o) => { upd({ flight: { cabin, price: o.price, airline: o.airline, depart: o.depart, arrive: o.arrive, stops: o.stops, flightNo: o.flightNo, offerId: o.offerId, chosen: true, real: true } }); };
  if (!from || !to) return <div style={{ fontSize: 13, color: t.inkFaint }}>Name both cities and the route appears here.</div>;

  return (<>
    <div style={{ background: t.card, borderRadius: 12, padding: "14px 16px", marginBottom: 12 }}>
      <div style={{ fontFamily: font.display, fontSize: 21 }}>{from} {fc ? `(${fc})` : ""} \u2192 {to} {tc ? `(${tc})` : ""}</div>

    </div>

    <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 4 }}>
      {CABINS.map((c) => { const ce = fareEstimate(from, to, c); const on = cabin === c;
        return <button key={c} onClick={() => chooseCabin(c)} style={{ padding: "9px 14px", borderRadius: 999, border: `1px solid ${on ? t.pine : t.line}`, background: on ? t.mist : t.white, color: t.ink, fontSize: 13, display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 2 }}>
          <span>{c}</span>{ce != null && <span style={{ fontSize: 11, color: t.brass }}>~{fmt(ce)} est.</span>}
        </button>; })}
    </div>
    {cabin && (<div style={{ marginTop: 14 }}>
      {live.loading && <div style={{ fontSize: 13, color: t.inkFaint, padding: "10px 2px" }}>Finding real {cabin} flights\u2026</div>}
      {!live.loading && live.offers && live.offers.length > 0 && (<>
        <div style={{ fontSize: 11.5, letterSpacing: "0.14em", textTransform: "uppercase", color: t.inkFaint, marginBottom: 8 }}>Choose your flight \u00b7 <span style={{ color: t.pine }}>live \u00b7 Duffel</span></div>
        {live.offers.map((o, k) => { const sel = chosen && chosen.offerId === o.offerId;
          return <button key={o.offerId || k} onClick={() => chooseFlight(o)} style={{ width: "100%", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 12, marginBottom: 8, border: `1px solid ${sel ? t.pine : t.line}`, background: sel ? t.mist : t.white }}>
            <span style={{ minWidth: 0 }}>
              <span style={{ display: "block", fontSize: 15, color: t.ink }}>{o.airline}{o.flightNo ? ` \u00b7 ${o.flightNo}` : ""}</span>
              <span style={{ display: "block", fontSize: 12.5, color: t.inkSoft, marginTop: 2 }}>{o.depart ? `Departs ${o.depart}` : "Time at booking"}{o.arrive ? ` \u2192 ${o.arrive}` : ""}{o.stops === 0 ? " \u00b7 nonstop" : o.stops > 0 ? ` \u00b7 ${o.stops} stop${o.stops > 1 ? "s" : ""}` : ""}</span>

        <div style={{ fontSize: 11, color: t.inkFaint, letterSpacing: "0.06em", marginTop: 2 }}>Real fares from Duffel \u00b7 one way \u00b7 tap to add to your plan</div>
      </>)}

      </div>)}
    </div>)}

            {f.level === "stop" ? <AlertTriangle size={14} color={c.ink} /> : f.level === "think" ? <Compass size={14} color={c.ink} /> : <ScrollText size={14} color={c.ink} />}
            <span style={{ fontSize: 10.5, letterSpacing: "0.16em", textTransform: "uppercase", color: c.ink }}>{c.word}</span>
          </div>
          <div style={{ fontFamily: font.display, fontSize: 21, color: t.ink, lineHeight: 1.25 }}>{f.title}</div>
          <div style={{ fontSize: 13.5, color: t.inkSoft, lineHeight: 1.6, marginTop: 6, whiteSpace: "pre-line" }}>{f.body}</div>
        </div>); })}
    </div>
  </div>);
}
function ItineraryView(p) {
  const sch = schedule(p);
  const rp = p.returnPick || {};
  const mapPoints = [];
  let grand = 0;
  const legEls = p.dests.map((d, i) => {
    const from = i === 0 ? p.fromCity : exitPoint(p.dests[i - 1]);
    const { total } = destCost(d, from); grand += total;
    const pk = d.pick || {};
    const rows = [];
    if (d.arriveBy === "Flight" && pk.flight) rows.push(<ItinLine key="f" label={`Fly · ${pk.flight.airline || "airline TBC"}${pk.flight.flightNo ? " " + pk.flight.flightNo : ""}`} sub={`${pk.flight.cabin || "cabin TBC"}${pk.flight.depart ? " · departs " + pk.flight.depart : ""}${pk.flight.stops === 0 ? " · nonstop" : pk.flight.stops > 0 ? ` · ${pk.flight.stops} stop` : ""}`} price={pk.flight.price != null ? pk.flight.price : null} />);
    else if (pk.ground) rows.push(<ItinLine key="g" label={`${d.arriveBy} from ${from || "start"}`} price={pk.ground.price} />);
    if (d.mode === "open") {
      if (pk.exploreMode === "base") {
        if (pk.baseTown) rows.push(<div key="bt" style={{ fontSize: 12, color: t.brass, marginBottom: 2 }}>Based in {pk.baseTown} — one hotel, days out</div>);
        if (pk.transfer) rows.push(<ItinLine key="tr" label={`${pk.transfer.mode} from ${gatewayFor(d.city) ? gatewayFor(d.city).air : "the airport"}`} sub="both ways" price={pk.transfer.price * 2} />);
        if (pk.stay) rows.push(<ItinLine key="s" label={pk.stay.name || pk.stay.level} sub={`${d.days} nights · ${pk.stay.level}`} price={pk.stay.nightly != null ? pk.stay.nightly * d.days : null} />);
        (pk.dines || []).forEach((x, k) => rows.push(<ItinLine key={"d" + k} label={x.name || "Dining"} sub={x.date ? fmtDay(new Date(x.date + "T00:00:00")) : "dining · date TBC"} price={x.price} />));
        (pk.sports || []).forEach((x, k) => rows.push(<ItinLine key={"spb" + k} label={x.name} sub={x.date ? fmtDay(new Date(x.date + "T00:00:00")) : "sport · date TBC"} price={x.price} />));
        (pk.days || []).forEach((x, k) => {
          rows.push(<ItinLine key={"dt" + k} label={x.name} sub={x.date ? fmtDay(new Date(x.date + "T00:00:00")) : "day out · date TBC"} price={x.price} />);
          (x.dines || []).forEach((dn, j) => rows.push(<ItinLine key={"dtd" + k + j} label={dn.name || "Dining"} sub={dn.date ? `${fmtDay(new Date(dn.date + "T00:00:00"))} · in ${x.town}` : `in ${x.town} · date TBC`} price={dn.price} />));
        });
      } else if (pk.exploreMode === "roam") {
        (pk.stops || []).forEach((st, k) => {
          const ss = sch.legs[i] && sch.legs[i].stops[k];
          const prev = k === 0 ? (gatewayFor(d.city) ? gatewayFor(d.city).air : from) : pk.stops[k - 1].name;
          const link = prev ? connection(prev, st.name) : null;
          rows.push(<div key={"st" + k} style={{ marginTop: k ? 14 : 0 }}>
            {link && <div style={{ fontSize: 11.5, color: t.brass, display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>{link.mode === "Ferry" ? <Ship size={12} /> : <Route size={12} />} {prev} → {st.name} · {link.label}{link.km ? ` · ${link.km} km` : ""}</div>}
            <div style={{ fontFamily: font.display, fontSize: 19, color: t.pine }}>{st.name}{ss ? <span style={{ fontFamily: font.ui, fontSize: 11.5, color: t.inkFaint, marginLeft: 8 }}>{fmtDay(ss.arrive)} – {fmtDay(ss.depart)}</span> : null}</div>
          </div>);
          if (st.stay) rows.push(<ItinLine key={"ss" + k} label={st.stay.name || st.stay.level} sub={`${st.nights || 1} nights · ${st.stay.level}`} price={st.stay.nightly != null ? st.stay.nightly * (st.nights || 1) : null} />);
          (st.dines || []).forEach((x, j) => rows.push(<ItinLine key={"sd" + k + j} label={x.name || "Dining"} sub={x.date ? fmtDay(new Date(x.date + "T00:00:00")) : "dining · date TBC"} price={x.price} />));
        });
      } else rows.push(<div key="none" style={{ fontSize: 13, color: t.inkFaint }}>Not yet decided.</div>);
    } else {
      if (pk.onward) rows.push(<ItinLine key="ow" label={`${pk.onward.mode} · ${pk.hub} → ${d.city}`} sub={pk.onward.label} price={pk.onward.price} />);
      if (pk.transfer) rows.push(<ItinLine key="tr" label={`${pk.transfer.mode} from ${gatewayFor(d.city) ? gatewayFor(d.city).air : "the airport"}`} sub="both ways" price={pk.transfer.price * 2} />);
      if (pk.stay) rows.push(<ItinLine key="s" label={pk.stay.name || pk.stay.level} sub={`${destNights(d)} nights · ${pk.stay.level}`} price={pk.stay.nightly * destNights(d)} />);
      (pk.dines || []).forEach((x, k) => rows.push(<ItinLine key={"d" + k} label={x.name || "Dining"} sub={x.date ? fmtDay(new Date(x.date + "T00:00:00")) : "dining · date TBC"} price={x.price} />));
      (pk.spas || []).forEach((x, k) => rows.push(<ItinLine key={"sp" + k} label={x.name} sub="spa" price={x.price} />));
      (pk.tours || []).forEach((x, k) => rows.push(<ItinLine key={"tr" + k} label={x.name} sub={x.date ? fmtDay(new Date(x.date + "T00:00:00")) : "tour · date TBC"} price={x.price} />));
      (pk.sports || []).forEach((x, k) => rows.push(<ItinLine key={"sp2" + k} label={x.name} sub={x.date ? fmtDay(new Date(x.date + "T00:00:00")) : "sport · date TBC"} price={x.price} />));
    }
    const ls = sch.legs[i];
    const baseMeta = d.mode === "open" ? `${d.days}-day explore` : d.mode === "flights" ? `${destNights(d)} nights · flights only` : `${destNights(d)} nights`;
    const meta = ls ? `${fmtDay(ls.arrive)} – ${fmtDay(ls.depart)} · ${baseMeta}` : baseMeta;
    if (d.mode === "open" && pk.exploreMode === "roam" && (pk.stops || []).length) { (pk.stops || []).forEach((st, k) => mapPoints.push({ name: st.name, when: ls && ls.stops[k] ? fmtShort(ls.stops[k].arrive) : "" })); }
    else if (d.mode === "open" && pk.baseTown) mapPoints.push({ name: pk.baseTown, when: ls ? fmtShort(ls.arrive) : "" });
    else if (d.mode === "open") { const gw = gatewayFor(d.city); const where = gw ? gw.air : d.city; if (where) mapPoints.push({ name: where, when: ls ? fmtShort(ls.arrive) : "" }); }
    else if (d.city) mapPoints.push({ name: d.city, when: ls ? fmtShort(ls.arrive) : "" });
    const nextD = p.dests[i + 1];
    const leaveFrom = exitPoint(d);
    const nextTarget = nextD ? (gatewayFor(nextD.city) ? gatewayFor(nextD.city).air : nextD.city) : (p.returnFrom || "");
    const onward = leaveFrom && nextTarget && !sameCity(leaveFrom, nextTarget) ? connection(leaveFrom, nextTarget) : null;
    if (onward) rows.push(<div key="onward" style={{ marginTop: 12, paddingTop: 10, borderTop: `1px dashed ${t.line}`, fontSize: 11.5, color: t.brass, display: "flex", alignItems: "center", gap: 6 }}>{onward.mode === "Ferry" ? <Ship size={12} /> : <Route size={12} />} On to {nextTarget} · {onward.label}{onward.km ? ` · ${onward.km} km` : ""}</div>);
    else if (nextTarget && leaveFrom && !sameCity(leaveFrom, nextTarget)) rows.push(<div key="onward" style={{ marginTop: 12, paddingTop: 10, borderTop: `1px dashed ${t.line}`, fontSize: 11.5, color: t.brass, display: "flex", alignItems: "center", gap: 6 }}><Plane size={12} /> On to {nextTarget} · by air</div>);
    return <ItinLeg key={i} n={i + 1} title={d.city || `Stop ${i + 1}`} meta={meta}>{rows.length ? rows : <div style={{ fontSize: 13, color: t.inkFaint }}>Nothing selected yet.</div>}</ItinLeg>;
  });
  const rc = returnCost(p); grand += rc.total;
  const route = [p.fromCity, ...p.dests.map((d) => d.city), p.homeCity].filter(Boolean).join("  ·  ");
  return (<div className="vo-fade" style={{ minHeight: "100vh" }}>
    <header className="vo-noprint" style={{ position: "sticky", top: 0, zIndex: 20, background: t.paper, borderBottom: `1px solid ${t.line}`, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px clamp(20px,5vw,48px)" }}>
      <button onClick={p.onEdit} style={{ background: "none", border: `1px solid ${t.line}`, borderRadius: 999, padding: "10px 18px", color: t.ink, display: "flex", alignItems: "center", gap: 8, fontSize: 13.5 }}><Pencil size={15} /> Edit</button>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={() => { if (typeof window !== "undefined") window.print(); }} style={{ background: "none", border: `1px solid ${t.line}`, borderRadius: 999, padding: "10px 18px", color: t.ink, fontSize: 13.5 }}>Print / Save PDF</button>
        <button onClick={p.onHome} style={{ background: "none", border: "none", color: t.inkFaint, display: "flex", alignItems: "center", gap: 6, fontSize: 13.5 }}><Home size={15} /> Home</button>
      </div>
    </header>
    <div style={{ maxWidth: 760, margin: "0 auto", padding: "0 clamp(22px,5vw,56px) 100px" }}>
      <div style={{ position: "relative", height: 240, borderRadius: 18, overflow: "hidden", marginTop: 24 }}>
        <Photo query={heroPlace(p)} h={240} radius={0} />
        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(34,29,25,.55), rgba(34,29,25,.15))" }} />
      </div>
      <div style={{ textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 16, padding: "40px 0", borderBottom: `1px solid ${t.line}` }}>
        <Eyebrow>Voyage One · Private Itinerary</Eyebrow>
        <h1 style={{ fontFamily: font.display, fontWeight: 400, margin: 0, fontSize: "clamp(34px,6vw,58px)", lineHeight: 1.05 }}>Curated for<br />{nameLine(p.travelers)}</h1>
        <Rule w={56} />
        <div style={{ fontSize: 14, letterSpacing: "0.06em", color: t.inkSoft }}>{fmtRange(p.dates.depart, p.dates.ret)}</div>
        {route && <div style={{ fontSize: 12.5, letterSpacing: "0.14em", textTransform: "uppercase", color: t.inkFaint, maxWidth: 560, lineHeight: 1.8 }}>{route}</div>}
      </div>
      <ExpertPanel p={p} sch={sch} />
      {mapPoints.length > 0 && (() => {
        const firstZone = zoneOf(mapPoints[0].name);
        const originNear = p.fromCity && zoneOf(p.fromCity) && firstZone && zoneOf(p.fromCity) === firstZone;
        const homeNear = p.homeCity && !sameCity(p.homeCity, p.fromCity) && zoneOf(p.homeCity) === zoneOf(mapPoints[mapPoints.length - 1].name);
        const pts = [...(originNear ? [{ name: p.fromCity, when: p.dates.depart ? fmtShort(new Date(p.dates.depart + "T00:00:00")) : "start" }] : []), ...mapPoints, ...(homeNear ? [{ name: p.homeCity, when: "home" }] : [])];
        const note = originNear ? "Order of travel · schematic, not to scale" : `From ${p.fromCity || "home"}, and back again · schematic, not to scale`;
        return <div style={{ marginTop: 30 }}><TripMap points={pts} note={note} /></div>;
      })()}
      <div style={{ marginTop: 40 }}>
        {legEls}
        {(rc.items.length > 0 || p.homeCity) && (<ItinLeg n={<Home size={15} />} title="Heading home" meta={p.homeCity ? `to ${p.homeCity}` : ""}>
          {rc.needLeg && p.returnPick.ground && <ItinLine label={`${p.returnMode} to ${p.returnFrom}`} price={p.returnPick.ground.price} />}
          {p.returnPick.flight && <ItinLine label={`Fly · ${p.returnPick.flight.airline || "airline TBC"}${p.returnPick.flight.flightNo ? " " + p.returnPick.flight.flightNo : ""}`} sub={`${p.returnPick.flight.cabin || "cabin TBC"}${p.returnPick.flight.depart ? " · departs " + p.returnPick.flight.depart : ""}`} price={p.returnPick.flight.price != null ? p.returnPick.flight.price : null} />}
          {rc.items.length === 0 && <div style={{ fontSize: 13, color: t.inkFaint }}>Flight home not yet chosen.</div>}
        </ItinLeg>)}
      </div>
      {p.returnFrom && p.homeCity && (() => { const dt = departTime(p.returnFrom, p.homeCity); const end = sch.end;
        return (<div style={{ marginTop: 22, background: t.card, borderRadius: 16, padding: "18px 20px" }}>
          <div style={{ fontSize: 10.5, letterSpacing: "0.18em", textTransform: "uppercase", color: t.inkFaint }}>Home</div>
          <div style={{ fontFamily: font.display, fontSize: 22, marginTop: 4 }}>{p.returnFrom} → {p.homeCity}</div>
          <div style={{ fontSize: 13, color: t.inkSoft, marginTop: 3 }}>{end ? fmtDay(end) : "date TBC"}{dt ? ` · departs about ${dt.time}` : ""}{rp && rp.flight && rp.flight.airline ? ` · ${rp.flight.airline}, ${rp.flight.cabin || "cabin TBC"}` : " · flight not chosen"}</div>
          {dt && <div style={{ fontSize: 12, color: t.inkFaint, marginTop: 5, lineHeight: 1.5 }}>{dt.note}</div>}
        </div>); })()}
      <PrepPanel p={p} />
      <div style={{ marginTop: 20, background: t.ink, color: t.paper, borderRadius: 18, padding: "26px 26px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div><Eyebrow color={t.brassLight}>Estimated total</Eyebrow><div style={{ fontSize: 12, color: "rgba(251,250,246,.6)", marginTop: 6 }}>Indicative — final on booking</div></div>
        <div style={{ fontFamily: font.display, fontSize: 46, lineHeight: 1 }}>{fmt(grand)}</div>
      </div>
      <div style={{ textAlign: "center", marginTop: 26, fontSize: 11.5, letterSpacing: "0.14em", textTransform: "uppercase", color: t.inkFaint }}>Voyage One · Private Travel Atelier</div>
    </div>
  </div>);
}


createRoot(document.getElementById("root")).render(<VoyageOne />);

</script>
